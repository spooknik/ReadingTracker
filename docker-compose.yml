services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: readingtracker
      POSTGRES_USER: readingtracker
      POSTGRES_PASSWORD: readingtracker_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U readingtracker -d readingtracker"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
