# Production docker-compose
# Usage: docker compose -f docker-compose.prod.yml up -d

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_ENABLE_READER: "${NEXT_PUBLIC_ENABLE_READER:-0}"
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://readingtracker:${DB_PASSWORD}@db:5432/readingtracker?schema=public"
      MAL_CLIENT_ID: "${MAL_CLIENT_ID}"
      DEFAULT_USER_EMAIL: "${DEFAULT_USER_EMAIL}"
      ENABLE_READER: "${ENABLE_READER:-0}"
      NEXT_PUBLIC_ENABLE_READER: "${NEXT_PUBLIC_ENABLE_READER:-0}"
      ENABLE_AUTO_RIP: "${ENABLE_AUTO_RIP:-0}"
      RIP_WORKER_SECRET: "${RIP_WORKER_SECRET:-}"
      NODE_ENV: production
    volumes:
      - rips:/app/data/rips
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: readingtracker
      POSTGRES_USER: readingtracker
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U readingtracker -d readingtracker"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  rips:
